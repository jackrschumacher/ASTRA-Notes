baseURL: https://astra.jackrschumacher.com
locale: "en"
title: ASTRA Notes
module:
  imports:
    - path: github.com/imfing/hextra
markup:
  goldmark:
    renderer:
      unsafe: true
outputs:
  home: [html, llms]
  page: [html, markdown]
  section: [html, rss, markdown]
enableGitInfo: true  
params:
  favicon: /favicon-96x96.png
  description: "ASTRA Documentation"
  displayUpdatedAuthor: true
  comments:
    enable: true
    type: giscus

    giscus:
      repo: "jackrschumacher/ASTRA-Notes"
      repoId: "R_kgDONPyQ1w"
      category: "Docs comments"
      categoryId: "DIC_kwDONPyQ184DBAoI"
      mapping: "title"
      inputPosition: "top"
      reactionsEnabled: 0
  navbar:
    displayLogo: true
    logo:
      path: favicon-96x96.png   # Path relative to 'static'
      width: 25                  # Adjust size as needed
      height: 25
  banner:
     key: "announcement"
     message: This site has recently been migrated to the Hextra theme. Report issues [here](https://github.com/jackrschumacher/ASTRA-Notes/issues)
  footer:
    enable: false
    displayCopyright: true
    displayPoweredBy: false
    width: normal
  blog:
    list:
      displayTags: true
  archives:
    section: blog

  imageZoom:
    enable: true
  toc:
    displayTags: true
  displayUpdatedDate: true
  dateFormat: "January 2, 2006"
  page:
    # full (100%), wide (90rem), normal (80rem)
    width: normal
    # tabs:
    #   sync: true
    contextMenu:
      enable: true
      links:     
menu:
  main:
   
    - name: Documentation
      pageRef: /docs
      weight: 1

  
    # - name: Archive
    #   pageRef: /archive
    #   parent: Other
    #   weight: 3
   

    # - name: Blog
    #   pageRef: /blog
    #   weight: 60
      

   

    # --- Hextra Special Features ---
    # These add the Search bar and Sun/Moon icon to the right side
    - name: Search
      params:
        type: search
      weight: 80

    - name: GitHub 
      url: "https://github.com/jackrschumacher/ASTRA-Notes"
      weight: 90
      params: 
        icon: github
        type: icon
      
    - name: Theme
      params:
        type: theme-toggle
      weight: 100